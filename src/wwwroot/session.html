<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

    <title>Mnemo - Training</title>
</head>

<body>
    <div class="section-title">
        <h2>Tasks</h2>
        <span>
            <div class="invert-interface-mode">
                <input type="checkbox" id="invert-mode">
                <label for="invert-mode" class="material-symbols-rounded"></label>
                <div class="invert-circle"></div>
            </div>
        </span>
    </div>

    <div>

        <article class="task">
            <header>
                <div class="prompt">
                    <span>1. Translate</span>
                    <span class="bold">"an apple"</span>
                </div>
                <div class="part-of-speech">(сущ.)</div>
            </header>
            <footer>
                <input type="text" placeholder="Answer..." name="answer" id="1">
            </footer>
            <button type="button" class="big-button">Submit</button>
        </article>

    </div>

    <div class="section-title">
        <h2>Answered</h2>
        <span>1/2</span>
    </div>

    <button type="button" class="big-button">Finish</button>
</body>

</html>
